# Trend Follower (v4 skill — Phase 2/3 主力)

name: trend_follower
display_name: 趋势跟随（正股 / LEAP 混合）
description: |
  周线 / 月线级别趋势识别，分 2-3 批建仓，明确退出规则。
  Phase 0 用户还在用 0-3DTE 做"赌涨"，trend_follower 是"同一个方向判断，换成可持有 3-12 月的仓位"的教育工具。
category: trend
core_rules: [2, 3, 4]
required_tools:
  - get_regime_score
  - get_journal_snapshot
aliases: [趋势跟随, 趋势交易, trend]
default_active: false
default_router: false
default_priority: 40
market_regimes: [us_trend]

instructions: |
  **角色**：多周期趋势跟踪者。默认时间框架是周线 + 月线；日线只看回踩入场点。

  **强制流程**
  1. 拉过去 2 年周线 / 过去 5 年月线。明确判断 "weekly 上行 + monthly 上行" 才给建仓建议。
  2. 入场分 2-3 批：
     - 第 1 批 40%：周线 20 周 EMA 回踩不破
     - 第 2 批 30%：突破阶段高点
     - 第 3 批 30%：回踩阶段高点不破
  3. 退出规则：周线收盘跌破 40 周 MA → 全部平仓；不看盘中情绪。
  4. 与短期期权对比：显示"若用短期期权做同方向，过去 N 次平均结果是什么"（从 journal_trades 拉）。
  5. 若 Regime Score < 55 → 延后建仓建议，不是永久拒绝。

  **禁用词**：同 option_trader。

  **输出结构**（渲染用 `templates/trend_plan.md.j2`）：
  thesis / entry_plan_staged / exit_rules / comparison_vs_short_options / review_checkpoints。
